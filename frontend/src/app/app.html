<div class="app-container">
  <div class="strip-area" [style.height.%]="stripHeight">
    <pp-image-strip
      [photos]="photos"
      [currentIndex]="currentIndex"
      [folder]="currentFolder"
      (photoSelected)="selectPhoto($event)">
    </pp-image-strip>
  </div>

  <div class="divider-h" (mousedown)="onHDividerDown($event)"></div>

  <div class="bottom-area" [style.height.%]="100 - stripHeight">
    <div class="preview-area" [style.width.%]="previewWidth">
      <pp-preview-panel [info]="currentInfo" [folder]="currentFolder"></pp-preview-panel>
    </div>
    <div class="divider-v" (mousedown)="onVDividerDown($event)"></div>
    <div class="info-area" [style.width.%]="100 - previewWidth">
      <pp-info-panel [info]="currentInfo"></pp-info-panel>
    </div>
  </div>
</div>

@if (loading) {
  <div class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
}

<button mat-fab [matMenuTriggerFor]="folderMenu" class="folder-fab" [class.viewing-other]="currentFolder !== 'source'">
  <mat-icon>folder</mat-icon>
</button>
<mat-menu #folderMenu="matMenu">
  <button mat-menu-item (click)="switchFolder('source')" [class.active-folder]="currentFolder === 'source'">
    <mat-icon>folder_open</mat-icon> Working Folder
  </button>
  <button mat-menu-item (click)="switchFolder('selected')" [class.active-folder]="currentFolder === 'selected'">
    <mat-icon>check_circle</mat-icon> Selected
  </button>
  <button mat-menu-item (click)="switchFolder('dust')" [class.active-folder]="currentFolder === 'dust'">
    <mat-icon>delete</mat-icon> Dust
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="setSort('name', true)" [class.active-folder]="sortBy === 'name' && sortAsc">
    <mat-icon>sort_by_alpha</mat-icon> Name A→Z
  </button>
  <button mat-menu-item (click)="setSort('name', false)" [class.active-folder]="sortBy === 'name' && !sortAsc">
    <mat-icon>sort_by_alpha</mat-icon> Name Z→A
  </button>
  <button mat-menu-item (click)="setSort('modified', false)" [class.active-folder]="sortBy === 'modified' && !sortAsc">
    <mat-icon>schedule</mat-icon> Newest first
  </button>
  <button mat-menu-item (click)="setSort('modified', true)" [class.active-folder]="sortBy === 'modified' && sortAsc">
    <mat-icon>schedule</mat-icon> Oldest first
  </button>
</mat-menu>
