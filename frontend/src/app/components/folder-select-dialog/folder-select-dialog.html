<h2 mat-dialog-title>Folder</h2>

<mat-dialog-content>
  <!-- Collection picker -->
  <div class="collection-row">
    @for (c of collections; track c.value) {
      <button mat-stroked-button
              [class.active-collection]="isActiveCollection(c)"
              (click)="selectCollection(c)">
        <mat-icon>{{ c.icon }}</mat-icon> {{ c.label }}
      </button>
    }
  </div>

  <mat-divider />

  <!-- Subfolder picker -->
  @if (loading) {
    <div class="spinner-wrap">
      <mat-spinner diameter="36"></mat-spinner>
    </div>
  } @else {
    @if (comfyOutputPath) {
      <div class="folder-item comfy-output-item"
           [class.is-selected]="selectedSubfolder === '__comfy_output'"
           (click)="selectComfyOutput()">
        <mat-icon>output</mat-icon>
        <span class="folder-label">ComfyUI Output — {{ comfyOutputName }}</span>
      </div>
      <mat-divider />
    }
    <div class="folder-list">
      @for (folder of folders; track folder) {
        <div class="folder-item"
             [class.is-selected]="selectedSubfolder === folder && selectedSubfolder !== '__comfy_output'"
             (click)="selectSubfolder(folder)">
          <mat-icon>{{ folder === '' ? 'folder_special' : 'folder' }}</mat-icon>
          <span class="folder-label">{{ displayName(folder) }}</span>
        </div>
      }
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button (click)="confirm()" [disabled]="confirmDisabled">
    Navigate
  </button>
</mat-dialog-actions>
