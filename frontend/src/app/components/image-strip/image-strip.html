<div class="strip-container" #stripContainer>
  @for (photo of photos; track photo.filename; let i = $index) {
    <div
      class="thumbnail"
      [class.active]="i === currentIndex"
      (click)="onThumbnailClick(i)">
      <img [attr.data-src]="getThumbnailUrl(photo.filename)" [alt]="photo.filename" />
    </div>
  }
  @empty {
    <div class="empty">No images found</div>
  }
</div>
